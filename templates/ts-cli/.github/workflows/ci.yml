name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same branch to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Fail fast on the cheapest checks first: lint → types → tests → build.
      - name: Lint (flat ESLint 9)
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test (Jest)
        run: npm test -- --ci --coverage

      # Build must also produce the npm-bin shebang (scripts/copy-shebang.js).
      - name: Build
        run: npm run build

  # Second job: block secrets / connection strings across the whole tree.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
