name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # nx affected needs history to diff against base

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - uses: nrwl/nx-set-shas@v4

      # Cheapest checks first so failures surface fast.
      - name: Format check
        run: npx nx format:check

      - name: Lint (incl. module boundaries + OnPush + no-any)
        run: npx nx affected -t lint --parallel=3

      - name: Stylelint (SCSS)
        run: npx stylelint "{apps,libs}/**/*.scss"

      - name: Test
        run: npx nx affected -t test --parallel=3 --ci --coverage

      - name: Build
        run: npx nx affected -t build --parallel=3 --configuration=production
