# Supy Flutter analysis config.
# Layers the very_good_analysis ruleset with bloc_lint so the reviewer's
# static rules (Bloc-not-Cubit, event/state discipline) are enforced by the
# analyzer as well as by review.
include: package:very_good_analysis/analysis_options.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  errors:
    # Missing awaits and dead code are errors, not warnings.
    unawaited_futures: error
    missing_required_param: error
    missing_return: error
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "**/*.gen.dart"
    - "**/*.config.dart"

# bloc_lint: enforces sealed events, avoids Cubit-only patterns, and flags
# BLoCs that emit outside an event handler. Requires the bloc_lint dev
# dependency; run `dart run bloc_lint` in CI (see .github/workflows/ci.yml).
linter:
  rules:
    # Style — keep in step with the design-token and import rules the reviewer checks.
    prefer_const_constructors: true
    prefer_const_constructors_in_immutables: true
    prefer_const_declarations: true
    require_trailing_commas: true
    directives_ordering: true
    always_use_package_imports: true
    avoid_print: true
    # Public API hygiene.
    public_member_api_docs: false
    lines_longer_than_80_chars: false
