name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same branch to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Nx affected needs history to diff against the base branch.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Sets NX_BASE / NX_HEAD so `nx affected` only runs what changed.
      - uses: nrwl/nx-set-shas@v4

      # Order matters: format + lint catch architecture/style violations first (fast),
      # then types, then tests, then build. Fail fast on the cheapest check.
      - name: Format check
        run: npx nx format:check

      - name: Lint (incl. module boundaries)
        run: npx nx affected -t lint --parallel=3

      - name: Type check
        run: npx nx affected -t typecheck --parallel=3

      - name: Test
        run: npx nx affected -t test --parallel=3 --ci --coverage

      - name: Build
        run: npx nx affected -t build --parallel=3
