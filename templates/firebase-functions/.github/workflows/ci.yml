name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Cancel superseded runs on the same branch to save minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    defaults:
      run:
        # The Functions package lives under functions/ in this standalone repo.
        working-directory: functions
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          # Match the Functions runtime (Node 22).
          node-version: 22
          cache: npm
          cache-dependency-path: functions/package-lock.json

      - name: Install dependencies
        run: npm ci

      # Fail fast on the cheapest checks first: lint → types → tests → build.
      - name: Lint (ESLint — replaces deprecated TSLint)
        run: npm run lint

      - name: Type check
        run: npm run typecheck

      - name: Test (Jest + firebase-functions-test)
        run: npm test -- --ci --coverage

      - name: Build
        run: npm run build

  # Second, repo-root job: block secrets across the whole tree, not just functions/.
  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
