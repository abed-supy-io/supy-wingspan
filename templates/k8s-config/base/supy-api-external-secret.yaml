# kind: ExternalSecret — sensitive values are pulled from the cloud secret manager at runtime.
# NO secret value appears in this file: only the manager KEY name (secrets-and-config.md#rules rule 3).
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: supy-api-secrets
spec:
  refreshInterval: 1h
  secretStoreRef:
    name: gcp-secret-manager
    kind: ClusterSecretStore
  target:
    name: supy-api-secrets   # materializes as a kind: Secret in-cluster
  dataFrom:
    - extract:
        key: supy-api-prod   # KEY in the secret manager — never a value in git
