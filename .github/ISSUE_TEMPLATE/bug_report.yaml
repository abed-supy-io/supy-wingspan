name: 🐛 Bug report
description: A component of the plugin behaves incorrectly (a skill, command, agent, or hook)
labels: [bug]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of supy-wingspan is affected?
      options:
        - Skill
        - Slash command
        - Review agent
        - Hook (stack detection)
        - Standard / template
        - Other
    validations:
      required: true
  - type: input
    id: name
    attributes:
      label: Component name
      description: e.g. `supy-review`, `/supy-build`, `supy-secrets-reviewer`, `detect-stack.sh`
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did the component do, and what did you expect instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Include the target repo stack (nestjs-nx / angular-nx / flutter / firebase-functions / ts-cli / ai-agents / k8s-config) and the exact command or prompt used.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Plugin version
      description: From `.claude-plugin/plugin.json`
    validations:
      required: false
