name: ✨ Feature request
description: Propose a new skill, command, agent, standard, or template — or an enhancement to an existing one
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What Supy engineering workflow is painful, inconsistent, or unenforced today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should the plugin do? Name the component type (skill / command / agent / standard / template / hook) and the stack it targets.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
