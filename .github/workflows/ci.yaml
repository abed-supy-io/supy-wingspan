name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  markdownlint:
    name: Markdown lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: DavidAnson/markdownlint-cli2-action@v24
        with:
          config: config/custom.markdownlint.jsonc
          globs: |
            **/*.md
            !CHANGELOG.md

  spellcheck:
    name: Spell check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: streetsidesoftware/cspell-action@v8
        with:
          config: config/cspell.json
          files: |
            **/*.md
            **/*.sh
          incremental_files_only: false

  shellcheck:
    name: Shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Shellcheck all shell scripts
        run: |
          shopt -s nullglob
          shellcheck hooks/*.sh scripts/*.sh skills/*/scripts/*.sh evals/*.sh .githooks/*

  manifests:
    name: JSON manifests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate JSON syntax
        run: |
          for f in .claude-plugin/plugin.json .claude-plugin/marketplace.json \
                   hooks/hooks.json config/cspell.json; do
            echo "checking $f"
            jq empty "$f"
          done

  skills:
    name: Skill structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate skill structure
        run: bash scripts/validate-skills.sh

  skill-hygiene:
    name: Skill hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check skill hygiene (triggering cue + non-stub body)
        run: bash scripts/check-skill-hygiene.sh

  agents:
    name: Agent structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate agent structure
        run: bash scripts/validate-agents.sh

  commands:
    name: Command structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate command structure
        run: bash scripts/validate-commands.sh

  docs-inventory:
    name: Docs inventory
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check doc component counts against the tree
        run: bash scripts/check-docs-inventory.sh

  xrefs:
    name: Cross-references
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate cross-references
        run: bash scripts/validate-xrefs.sh

  detect-stack:
    name: Stack detection tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run detect-stack fixture tests
        run: bash scripts/test-detect-stack.sh

  skill-router:
    name: Skill router tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Run skill-router fixture tests
        run: bash scripts/test-skill-router.sh

  eval-fixtures:
    name: Eval fixtures
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Validate behavioral-eval fixture structure
        # Deterministic, no API key. The behavioral scorer (run-secrets-eval.sh)
        # calls an LLM and is run locally/nightly, not gated here.
        run: bash evals/validate-fixtures.sh

  enforcement:
    name: Enforcement gates
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check review teeth (verification protocol + severity log)
        run: bash scripts/check-review-teeth.sh
      - name: Check template pre-commit/commit-msg hooks
        run: bash scripts/check-template-hooks.sh

  links:
    name: Markdown links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Check local markdown links
        uses: lycheeverse/lychee-action@v2
        with:
          # Offline: validate intra-repo file links only; external URLs are
          # too flaky to gate CI on.
          args: --offline --no-progress "**/*.md"
          fail: true
